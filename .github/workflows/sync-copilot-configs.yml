name: Sync Copilot Configs

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'awesome-copilot source ref (branch, tag, or commit SHA)'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-copilot-configs
  cancel-in-progress: false

jobs:
  sync:
    name: Sync awesome-copilot assets
    runs-on: ubuntu-latest
    # 新增：强制使用 Node.js 24 运行 JavaScript Action
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DEFAULT_SOURCE_REF: main
      SOURCE_REPO: https://github.com/github/awesome-copilot.git
      SYNC_BRANCH: automation/sync-copilot-configs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT if you want workflows to trigger on the created PR
          # token: ${{ secrets.PAT_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve source ref and schedule flags
        id: context
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.source_ref }}" ]]; then
            source_ref="${{ inputs.source_ref }}"
          else
            source_ref="$DEFAULT_SOURCE_REF"
          fi

          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"

      - name: Clone source repository with sparse checkout
        shell: bash
        run: |
          set -euo pipefail
          git clone \
            --depth=1 \
            --branch "${{ steps.context.outputs.source_ref }}" \
            --filter=blob:none \
            --sparse \
            "$SOURCE_REPO" __awesome_copilot__

          cd __awesome_copilot__
          git sparse-checkout set instructions agents

      - name: Synchronize directories
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .github/instructions .github/agents

          # Sync only directories/files that exist in the source repository
          if [ -d "__awesome_copilot__/instructions" ]; then
            rsync -a --delete __awesome_copilot__/instructions/ .github/instructions/
          fi

          if [ -d "__awesome_copilot__/agents" ]; then
            rsync -a --delete __awesome_copilot__/agents/ .github/agents/
          fi

          if [ -f "__awesome_copilot__/.gitignore" ]; then
            cp __awesome_copilot__/.gitignore .gitignore
          fi

      - name: Update sync readme
        shell: bash
        run: |
          set -euo pipefail

          synced_at="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          cat <<EOF > SYNC_README.md
          # 自动同步说明

          此仓库中的 Copilot 配置文件通过 GitHub Actions 自动从 [Awesome GitHub Copilot Customizations](https://github.com/github/awesome-copilot) 同步。

          ## 同步内容

          - **.github/instructions/**: GitHub Copilot 指令文件
          - **.github/agents/**: GitHub Copilot 代理文件
          - **.gitignore**: Git 忽略规则文件

          ## 同步时间

          - 每天北京时间 00:00 自动执行同步

          ## 手动触发

          如需立即同步，可在 GitHub Actions 页面手动运行 **Sync Copilot Configs** workflow。

          ## 注意事项

          请勿直接修改上述同步目录中的文件，否则会在下一次同步时被覆盖。如需定制，请在其他目录维护自己的文件。

          ## 来源项目

          - 来源仓库: https://github.com/github/awesome-copilot
          - 来源版本: ${{ steps.context.outputs.source_ref }}

          最后同步时间: $synced_at
          EOF

      - name: Commit synced changes to default branch
        id: commit_sync
        shell: bash
        run: |
          set -euo pipefail

          rm -rf __awesome_copilot__
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Check if remote branch already exists
          if git ls-remote --exit-code --heads origin "$SYNC_BRANCH" > /dev/null 2>&1; then
            git fetch origin "$SYNC_BRANCH"
            git checkout "$SYNC_BRANCH"
          else
            git checkout -b "$SYNC_BRANCH"
          fi

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add .github/instructions .github/agents .gitignore SYNC_README.md
          git commit -m "chore: sync awesome-copilot configs"

          # Rebase onto remote branch to avoid force-push
          if git ls-remote --exit-code --heads origin "$SYNC_BRANCH" > /dev/null 2>&1; then
            git rebase "origin/$SYNC_BRANCH"
          fi

          git push origin "$SYNC_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        if: steps.commit_sync.outputs.changed == 'true'
        env:
          # To fix "GitHub Actions is not permitted to create or approve pull requests" error:
          # Option 1 (Recommended): Enable in repository settings:
          #   Settings → Actions → General → Workflow permissions →
          #   Check "Allow GitHub Actions to create and approve pull requests"
          # Option 2: Use a Personal Access Token (PAT) with 'repo' scope:
          #   Create a PAT at https://github.com/settings/tokens
          #   Add it as a secret named PAT_TOKEN in repository settings
          #   Then uncomment the line below and comment out the GITHUB_TOKEN line
          # GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          cat <<EOF > pr-body.md
          This pull request was created automatically by GitHub Actions.

          Summary:
          - Sync instructions, agents and .gitignore from github/awesome-copilot
          - Update SYNC_README.md with source and sync metadata

          Source ref: ${{ steps.context.outputs.source_ref }}
          EOF

          existing_pr="$(gh pr list \
            --head "$SYNC_BRANCH" \
            --base "${{ github.event.repository.default_branch }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -n "$existing_pr" ]]; then
            gh pr edit "$existing_pr" \
              --title "chore: sync awesome-copilot configs" \
              --body-file pr-body.md
            pr_number="$existing_pr"
          else
            gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$SYNC_BRANCH" \
              --title "chore: sync awesome-copilot configs" \
              --body-file pr-body.md
            pr_number="$(gh pr list \
              --head "$SYNC_BRANCH" \
              --base "${{ github.event.repository.default_branch }}" \
              --state open \
              --json number \
              --jq '.[0].number')"
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge on pull request
        if: steps.commit_sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          pr_number="$(gh pr list \
            --head "$SYNC_BRANCH" \
            --base "${{ github.event.repository.default_branch }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -n "$pr_number" ]]; then
            gh pr merge "$pr_number" \
              --auto \
              --squash \
              --delete-branch
          fi
